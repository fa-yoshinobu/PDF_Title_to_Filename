name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: PDF_Title_to_Filename/PDF_Title_to_Filename.csproj

      - name: Restore
        run: dotnet restore PDF_Title_to_Filename.sln

      - name: Check formatting
        run: dotnet format PDF_Title_to_Filename.sln --verify-no-changes --no-restore

      - name: Test
        run: dotnet test PDF_Title_to_Filename.sln -c Release --verbosity normal

      - name: Publish single-file executable
        run: dotnet publish PDF_Title_to_Filename\PDF_Title_to_Filename.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o artifacts\publish

      - name: Verify publish output
        shell: pwsh
        run: |
          $exe = "artifacts/publish/PDF_Title_to_Filename.exe"
          if (-not (Test-Path $exe)) {
            throw "Single-file executable was not created: $exe"
          }

          $file = Get-Item $exe
          $sizeMiB = [math]::Round($file.Length / 1MB, 2)
          Write-Host "Created $($file.Name) ($sizeMiB MiB)"
